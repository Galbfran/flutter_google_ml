name: google_ml_kit_test_app
description: "Plantilla base Flutter: BLoC, GoRouter, Dio y estructura por features."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8

  # Navegación
  go_router: ^17.0.0

  # Estado (BLoC)
  equatable: ^2.0.7
  flutter_bloc: ^9.1.1

  # Red y logging
  dio: ^5.9.0
  logger: ^2.6.0
  google_ml_kit: ^0.21.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Calidad / análisis estático
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
